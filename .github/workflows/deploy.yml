# .github/workflows/deploy.yml
# This file runs automatically every time you push to GitHub!

name: CI/CD Pipeline — Sarath Portfolio

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─── JOB 1: LINT & TEST ───────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install backend dependencies
        run: npm install
        working-directory: ./backend

      - name: 🧹 Lint check (HTML)
        run: |
          echo "Checking HTML file exists..."
          test -f index.html && echo "✅ index.html found" || exit 1

      - name: 🧹 Lint check (CSS)
        run: |
          echo "Checking CSS file exists..."
          test -f style.css && echo "✅ style.css found" || exit 1

      - name: 🧹 Lint check (JS)
        run: |
          echo "Checking JS file exists..."
          test -f script.js && echo "✅ script.js found" || exit 1

      - name: ✅ Run backend tests
        run: npm test
        working-directory: ./backend

      - name: 🔍 Check server.js syntax
        run: node --check server.js
        working-directory: ./backend

  # ─── JOB 2: DEPLOY TO GITHUB PAGES ──────────────────────────
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: lint-and-test        # Only runs if lint-and-test passes!
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write           # Needed to push to gh-pages branch

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./           # Deploy root folder (where index.html is)
          exclude_assets: '.github,backend,node_modules,*.md'
